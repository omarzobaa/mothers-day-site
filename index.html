<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Tribute to Excellence</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@200;400;600&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1a1a1a;
            --primary-gold: #d4af37;
            --soft-rose: #ffd1dc;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; /* We're building a custom cursor */
        }

        body {
            background: radial-gradient(circle at center, #2d1b22 0%, #0f0f0f 100%);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Custom Interactive Cursor */
        #cursor {
            width: 20px;
            height: 20px;
            background: var(--primary-gold);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.1s ease;
        }

        .main-container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 85%;
            max-width: 800px;
            padding: 60px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 40px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            transform: scale(0.9);
            opacity: 0;
            transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .main-container.active {
            transform: scale(1);
            opacity: 1;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 5rem;
            background: linear-gradient(to right, #fff, var(--primary-gold), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        #message-sequence {
            font-family: 'Bodoni Moda', serif;
            font-size: 1.8rem;
            font-style: italic;
            height: 80px;
            margin: 40px 0;
            color: var(--soft-rose);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }

        .btn-start {
            margin-top: 30px;
            padding: 15px 40px;
            background: transparent;
            border: 1px solid var(--primary-gold);
            color: var(--primary-gold);
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
            border-radius: 100px;
            transition: 0.4s;
        }

        .btn-start:hover {
            background: var(--primary-gold);
            color: #000;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
        }

        .footer-note {
            position: absolute;
            bottom: 20px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            opacity: 0.4;
            text-transform: uppercase;
        }

        /* Responsive Mobile Tweak */
        @media (max-width: 600px) {
            h1 { font-size: 3rem; }
            .main-container { padding: 30px; }
            #message-sequence { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div id="cursor"></div>
    <canvas id="canvas"></canvas>

    <div class="main-container" id="card">
        <h1>For You</h1>
        <div id="message-sequence">Click the button to begin...</div>
        <button class="btn-start" onclick="startExperience()">Begin Journey</button>
    </div>

    <div class="footer-note">Unmatched Grace • Unending Strength</div>

    <script>
        const cursor = document.getElementById('cursor');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const card = document.getElementById('card');
        const msgElement = document.getElementById('message-sequence');
        
        let petals = [];
        let interactionStarted = false;

        // Custom Cursor Logic
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // 10-Point Sequence
        const tributes = [
            "Today is a celebration of you.",
            "Of your quiet strength and resilience.",
            "Of the hard work that often goes unseen.",
            "Of the kindness that heals everything it touches.",
            "The way you handle the world is breathtaking.",
            "You are the anchor in every storm.",
            "The standard for grace and character.",
            "Thank you for simply being who you are.",
            "The world is brighter because you're in it.",
            "Happy Mother's Day, to the very best."
        ];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Petal {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = -20;
                this.size = Math.random() * 5 + 2;
                this.speed = Math.random() * 1.5 + 0.5;
                this.angle = Math.random() * 360;
                this.spin = Math.random() * 0.02 * (Math.random() > 0.5 ? 1 : -1);
            }
            update() {
                this.y += this.speed;
                this.angle += this.spin;
                this.x += Math.sin(this.angle) * 0.5;
                if (this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.fillStyle = interactionStarted ? "#d4af37" : "#ffd1dc";
                ctx.globalAlpha = 0.6;
                ctx.beginPath();
                ctx.ellipse(0, 0, this.size, this.size * 1.5, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function init() {
            for (let i = 0; i < 70; i++) petals.push(new Petal());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            petals.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        async function startExperience() {
            interactionStarted = true;
            const btn = document.querySelector('.btn-start');
            btn.style.display = 'none';

            for (let text of tributes) {
                msgElement.style.opacity = 0;
                await new Promise(r => setTimeout(r, 800));
                msgElement.innerText = text;
                msgElement.style.opacity = 1;
                await new Promise(r => setTimeout(r, 3000));
            }

            // Finale
            msgElement.innerHTML = "<span style='color:white; font-weight:bold;'>I Appreciate Everything.</span>";
            card.style.borderColor = "var(--primary-gold)";
            card.style.boxShadow = "0 0 50px rgba(212, 175, 55, 0.2)";
        }

        window.onload = () => {
            init();
            animate();
            setTimeout(() => card.classList.add('active'), 500);
        };
    </script>
</body>
</html>
